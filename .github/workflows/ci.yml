name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Full matrix: 3 OSes × 2 feature combos.
  # Catches platform-specific issues (Windows path separators, macOS linker
  # differences, sqlite-vec C compilation variance) that used to ship silently
  # because CI only ran on ubuntu-latest while release.yml builds 5 platform
  # binaries. Toolchain is pinned for reproducibility (memory:
  # feedback_ship_baseline_and_flakes).
  check:
    name: Check & Test (${{ matrix.os }}, ${{ matrix.feature-label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        feature-flag: ["--no-default-features", ""]
        include:
          - feature-flag: "--no-default-features"
            feature-label: "no-embed"
          - feature-flag: ""
            feature-label: "with-embed"
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}-${{ matrix.feature-label }}

      - name: Check
        run: cargo check ${{ matrix.feature-flag }}

      - name: Clippy
        run: cargo clippy ${{ matrix.feature-flag }} -- -D warnings

      - name: Test
        run: cargo test ${{ matrix.feature-flag }}

  # Plugin/lifecycle/release-smoke tests are Node-based and OS-independent —
  # run once on Linux to avoid the 3× matrix blow-up.
  plugin-tests:
    name: Plugin & Lifecycle Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: Plugin lifecycle tests
        run: node --test claude-plugin/scripts/lifecycle.test.js claude-plugin/scripts/lifecycle.e2e.test.js claude-plugin/scripts/auto-update.test.js claude-plugin/scripts/session-init.test.js scripts/release-smoke.test.js

  # Supply-chain CVE scan over Cargo.lock (376 transitive deps including the
  # Candle ML stack). cargo-audit reads RustSec advisories and exits non-zero
  # on any vulnerability — keeps CVE coverage continuous instead of a one-time
  # review. Independent of the check-and-test matrix because it scans
  # Cargo.lock content, not build output.
  #
  # Pinned to cargo-audit ^0.22 because 0.21.x panics on RustSec advisories
  # using CVSS 4.0 (e.g. RUSTSEC-2026-0066) — the fetch fails before any
  # finding can be reported.
  #
  # No `--deny warnings`: vulnerabilities fail the run by default; informational
  # advisories (`unmaintained`, `unsound`) print but don't block — most are
  # transitive and not under our control until upstream replacements ship.
  audit:
    name: Cargo Audit (supply-chain CVE scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: Swatinem/rust-cache@v2
        with:
          key: cargo-audit
      - name: Install cargo-audit
        run: cargo install --locked --version ^0.22 cargo-audit
      - name: Run cargo audit
        run: cargo audit
